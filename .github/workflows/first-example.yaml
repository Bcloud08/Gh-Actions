name: my first workflow

on:
  - push
  - workflow_dispatch

jobs:
  first-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Welcome message
        run: echo "my first workflow"

      - name: List files
        run: ls -la

      - name: Display README file
        run: cat README.md